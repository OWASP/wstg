name: Build Ebooks

on:
  push:
    tags: 
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version?'
        required: true
        default: '4.x'
jobs:
  build:
    if: github.actor == 'kingthorin' || github.actor == 'ThunderSon' || github.actor == 'rejahrehim' || github.actor == 'victoriadrake'
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
    - name: Setup Action
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 24
    - name: SetUp python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install libgbm1
        npm install -g md-to-pdf
        sudo snap install pdftk
        sudo apt install pandoc
    - name: Get Tag Version
      if: github.event_name == 'push'
      id: vars
      run: echo "tag=$(echo ${GITHUB_REF:10})" >> $GITHUB_OUTPUT
    - name: Run Push Build
      if: github.event_name == 'push'
      run: |
        npm run-script  pdfgen -- ${{ steps.vars.outputs.tag }}
        npm run-script  epubgen -- ${{ steps.vars.outputs.tag }}
    - name: Run Workflow Build
      if: github.event_name == 'workflow_dispatch'
      run: |
        npm run-script  pdfgen -- ${{ github.event.inputs.version }}
        npm run-script  epubgen -- ${{ github.event.inputs.version }}
    - name: Upload Ebooks for Release
      if: github.event_name == 'push'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: wstg-${{ steps.vars.outputs.tag }}-ebooks
        path: |
          ./build/wstg-${{ steps.vars.outputs.tag }}.pdf
          ./build/wstg-${{ steps.vars.outputs.tag }}.epub
    - name: Attach PDF and Epub
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: wstg-${{ github.event.inputs.version }}-ebooks
        path: |
          ./build/wstg-${{ github.event.inputs.version }}.pdf
          ./build/wstg-${{ github.event.inputs.version }}.epub
  release:
    if: github.event_name == 'push'
    needs: build
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Ebooks
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wstg-${{ needs.build.outputs.tag }}-ebooks
        path: ./build
    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        name: Release ${{ needs.build.outputs.tag }}
        artifacts: "./build/wstg-${{ needs.build.outputs.tag }}.pdf, ./build/wstg-${{ needs.build.outputs.tag }}.epub"
        artifactErrorsFailBuild: true
        draft: false
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
