<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWASP WSTG Interactive Checklist</title>
    <link rel="icon" href="owasp-logo.webp" type="image/webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Include marked.js for markdown rendering of fields like methodology -->
    <script src="marked.min.js"></script>
    <script src="jszip.min.js"></script>
    <script src="wstg_checklist_data.js?v=3"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <img src="owasp-logo.webp" alt="OWASP Logo" class="header-logo">
                <div>
                    <h1 data-i18n="header_title">OWASP WSTG Checklist</h1>
                    <p data-i18n="header_subtitle">Web Application Security Testing Guide Companion</p>
                </div>
            </div>
            <div class="header-right">
                <div class="progress-container">
                    <span id="progress-text">0 / 0 Completed</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="actions">
                    <button id="search-toggle-btn" class="search-toggle-btn" title="Search">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 1.25rem; height: 1.25rem; display: block;">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                    <button id="export-btn" class="btn primary" data-i18n="export_btn">Export State</button>
                    <button id="import-btn" class="btn secondary" data-i18n="import_btn">Import State</button>
                    <input type="file" id="import-file" style="display: none;" accept=".json,.zip">
                    <div class="lang-dropdown-container" id="lang-dropdown-container">
                        <button id="lang-toggle" class="btn lang-btn" title="Change Language">
                            <span class="lang-flag"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="20" height="14" preserveAspectRatio="none" style="border-radius:2px;"><clipPath id="s"><path d="M0,0 v30 h60 v-30 z"/></clipPath><clipPath id="t"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z"/></clipPath><g clip-path="url(#s)"><path d="M0,0 v30 h60 v-30 z" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></g></svg></span> <span class="lang-arrow">▼</span>
                        </button>
                        <div class="lang-dropdown-menu" id="lang-dropdown-menu">
                            <div class="lang-option" data-value="en">
                                <span class="lang-flag"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="20" height="14" preserveAspectRatio="none" style="border-radius:2px;"><clipPath id="s2"><path d="M0,0 v30 h60 v-30 z"/></clipPath><clipPath id="t2"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z"/></clipPath><g clip-path="url(#s2)"><path d="M0,0 v30 h60 v-30 z" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t2)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></g></svg></span> ENGLISH <span class="lang-check">✔</span>
                            </div>
                            <div class="lang-option" data-value="de">
                                <span class="lang-flag"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5 3" width="20" height="14" preserveAspectRatio="none" style="border-radius:2px;"><rect width="5" height="3" y="0" x="0" fill="#000"/><rect width="5" height="2" y="1" x="0" fill="#D00"/><rect width="5" height="1" y="2" x="0" fill="#FFCE00"/></svg></span> DEUTSCH <span class="lang-check">✔</span>
                            </div>
                        </div>
                    </div>
                    <label class="theme-switch" title="Toggle Theme">
                        <input type="checkbox" id="theme-toggle-input">
                        <span class="slider round">
                            <svg class="slider-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                            <svg class="slider-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        </span>
                    </label>
                </div>

                <div class="search-overlay">
                    <svg class="search-icon-inside" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 1.1rem; height: 1.1rem;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search (e.g. WSTG, API, XSS)..." data-i18n-placeholder="search_placeholder" autocomplete="off">
                    <button id="search-close-btn" class="search-close-btn" title="Close search">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 1.1rem; height: 1.1rem; display: block;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="checklist-container" id="checklist-container">
            <!-- Categories and Modules will be rendered here by JS -->
        </main>

        <footer style="margin-top: 3rem; text-align: center; padding-bottom: 2rem;">
            <div style="margin-bottom: 1.5rem;">
                <button id="reset-btn" class="btn secondary" style="color: var(--danger-color); border-color: var(--danger-color); font-weight: bold;" data-i18n="reset_btn">⚠️ Alles zurücksetzen</button>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
                <p><strong>Version:</strong> WSTG v5.0 (Stable)</p>
                <p>
                    <a href="https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/" target="_blank" rel="noopener noreferrer">OWASP WSTG Website</a> | 
                    <a href="https://github.com/OWASP/wstg/tree/master" target="_blank" rel="noopener noreferrer">GitHub Repository</a>
                </p>
            </div>
        </footer>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
